<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-icons/4.0.0/iconfont/material-icons.min.css" referrerpolicy="no-referrer" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
</head>
<body>
    
    <div class="container">
        <h2>Currency Converter</h2>
        <form>
        <div class="amount">
            <p> Enter Amount:</p>
             <input type="text" placeholder="Enter  Amount" id="amount" name="amount" required>
        </div>
        <div class="dropdown">
            <div class="from">
                <p>From:</p>
                <div class="select-container">
                   <img src="https://flagsapi.com/US/flat/64.png">
                    <select name="from" id="">
                    </select>
                </div>
            </div>
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
            <div class="to">
                <p>To:</p>
                <div class="select-container">
                 <img src="https://flagsapi.com/NP/flat/64.png">
                    <select name="to" id="">
                    </select>
                </div>
            </div>
        </div>
        <div class="msg">YOUR AMOUNT</div>
        <button>Get Exchange </button>
        </form>
    </div>
   <script src="code.js"></script>
    <script src="script.js"></script>
</body>
</html>
